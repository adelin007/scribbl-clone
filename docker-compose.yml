version: "3.8"
services:
  server:
    build:
      context: ./server
    image: scribbl-server:latest
    restart: unless-stopped
    environment:
      # Read values from .env (defaults provided). Set these in your VPS .env.
      CLIENT_URL: "${CLIENT_URL:-http://localhost}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
    networks:
      - scribbl-net

  client:
    build:
      context: ./client
      args:
        # At build time you can inject a socket URL; however the client will default
        # at runtime the client will default to the current origin (recommended)
        # To force a specific socket URL set VITE_SOCKET_URL here during build.
        # Pass build-time override; leave empty to let the client default to runtime origin
        VITE_SOCKET_URL: "${VITE_SOCKET_URL:-}"
    image: scribbl-client:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NODE_ENV: production
    networks:
      - scribbl-net
    volumes:
      - caddy-data:/data
      - caddy-config:/config

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - scribbl-net

networks:
  scribbl-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
